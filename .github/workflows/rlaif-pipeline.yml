name: RLAIF Training Data Pipeline

on:
  # Weekly schedule: Sunday 11 PM IST = Sunday 5:30 PM UTC
  schedule:
    - cron: '30 17 * * 0'

  # Manual trigger
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated repos (owner/repo) or "all" for training list'
        required: false
        default: 'all'
      model_provider:
        description: 'LLM provider (anthropic, openai, deepseek, groq, together, fireworks, mistral, gemini, ollama)'
        required: false
        default: 'anthropic'
      model_name:
        description: 'Model name (e.g., claude-sonnet-4-6, gpt-4o, deepseek-chat)'
        required: false
        default: 'claude-sonnet-4-6'
      api_base:
        description: 'Custom API base URL (for self-hosted / proxy endpoints, leave empty for default)'
        required: false
        default: ''
      skip_generate:
        description: 'Skip data generation, only format existing DB'
        required: false
        type: boolean
        default: false
      use_batch_api:
        description: 'Use Anthropic Batch API (50% cheaper, async — submit + poll + collect)'
        required: false
        type: boolean
        default: true
      enable_retry:
        description: 'Enable Pass@2 retry for rejected findings (15-20% more verified data)'
        required: false
        type: boolean
        default: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  generate-training-data:
    name: Generate RLAIF Training Data
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install litellm huggingface_hub anthropic

      - name: Generate training data
        if: ${{ !inputs.skip_generate }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHERAI_API_KEY: ${{ secrets.TOGETHERAI_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROVIDER="${{ inputs.model_provider || 'anthropic' }}"
          MODEL_NAME="${{ inputs.model_name || 'claude-sonnet-4-6' }}"
          API_BASE="${{ inputs.api_base || '' }}"
          REPOS_INPUT="${{ inputs.repos || 'all' }}"
          USE_BATCH="${{ inputs.use_batch_api || 'true' }}"
          ENABLE_RETRY="${{ inputs.enable_retry || 'true' }}"

          COMMON_ARGS="--provider $PROVIDER --model-name $MODEL_NAME --output rlaif/data --workspace .rlaif_repos"
          if [ -n "$API_BASE" ]; then
            COMMON_ARGS="$COMMON_ARGS --api-base $API_BASE"
          fi

          # Batch mode flag (50% cheaper via Anthropic Batch API)
          BATCH_FLAG=""
          if [ "$USE_BATCH" = "true" ] && [ "$PROVIDER" = "anthropic" ]; then
            BATCH_FLAG="--batch"
          fi

          # Pass@2 retry flag (15-20% more verified data)
          RETRY_FLAG=""
          if [ "$ENABLE_RETRY" = "false" ]; then
            RETRY_FLAG="--no-retry"
          fi

          if [ "$REPOS_INPUT" = "all" ]; then
            python -m rlaif.generate \
              --repos rlaif/repos_training.json \
              $COMMON_ARGS $BATCH_FLAG $RETRY_FLAG
          else
            IFS=',' read -ra REPOS <<< "$REPOS_INPUT"
            for repo in "${REPOS[@]}"; do
              repo=$(echo "$repo" | xargs)
              python -m rlaif.generate \
                --repo "$repo" \
                $COMMON_ARGS $BATCH_FLAG $RETRY_FLAG
            done
          fi

      - name: Collect batch results (poll until complete)
        if: ${{ !inputs.skip_generate && (inputs.use_batch_api || true) && (inputs.model_provider || 'anthropic') == 'anthropic' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -f rlaif/data/pending_batches.json ]; then
            echo "Polling for batch completion (may take up to 1 hour)..."
            python -m rlaif.generate --batch-collect-all --output rlaif/data
          else
            echo "No pending batches found (live mode was used)"
          fi

      - name: Format DPO training pairs
        run: |
          python -m rlaif.format_dpo \
            --db rlaif/data/training_data.db \
            --output rlaif/data \
            --max-dpo-pairs 10000

      - name: Show training data stats
        run: |
          echo "=== Training Data Statistics ==="
          if [ -f rlaif/data/category_stats.json ]; then
            python -c "
          import json
          with open('rlaif/data/category_stats.json') as f:
              stats = json.load(f)
          print(f'SFT pairs:  {stats[\"sft_pairs\"]}')
          print(f'DPO pairs:  {stats[\"dpo_pairs\"]}')
          print(f'Verified:   {stats[\"total_verified\"]}')
          print(f'Dropped:    {stats[\"total_dropped\"]}')
          retry_total = sum(s.get('retry_verified', 0) for s in stats.get('categories', {}).values())
          if retry_total > 0:
              print(f'Pass@2 recovered: {retry_total}')
          print()
          print('Per-category breakdown:')
          for cat, s in sorted(stats['categories'].items(), key=lambda x: x[1]['total'], reverse=True):
              print(f'  {cat:30s}  verified={s[\"verified\"]:4d}  dropped={s[\"dropped\"]:4d}  rate={s[\"verification_rate\"]}%')
          "
          fi

      - name: Upload training data artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlaif-training-data-${{ github.run_id }}
          path: |
            rlaif/data/sft_data.jsonl
            rlaif/data/dpo_data.jsonl
            rlaif/data/category_stats.json
            rlaif/data/generate_summary.json
            rlaif/data/README.md
          retention-days: 90

      - name: Upload SQLite DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlaif-database-${{ github.run_id }}
          path: rlaif/data/training_data.db
          retention-days: 90

  upload-to-huggingface:
    name: Upload to HuggingFace Datasets
    needs: generate-training-data
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Download training data artifact
        uses: actions/download-artifact@v4
        with:
          name: rlaif-training-data-${{ github.run_id }}
          path: rlaif/data/

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi, create_repo

          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = 'rigour-labs/rigour-rlaif-data'

          # Create dataset repo if it doesn't exist
          try:
              create_repo(repo_id, repo_type='dataset', token=os.environ['HF_TOKEN'], exist_ok=True)
          except Exception as e:
              print(f'Repo creation note: {e}')

          # Upload all training files
          files_to_upload = [
              'rlaif/data/sft_data.jsonl',
              'rlaif/data/dpo_data.jsonl',
              'rlaif/data/category_stats.json',
              'rlaif/data/README.md',
          ]

          for filepath in files_to_upload:
              if os.path.exists(filepath):
                  filename = os.path.basename(filepath)
                  print(f'Uploading {filename}...')
                  api.upload_file(
                      path_or_fileobj=filepath,
                      path_in_repo=filename,
                      repo_id=repo_id,
                      repo_type='dataset',
                  )
                  print(f'  ✓ {filename} uploaded')

          print(f'\\nDataset available at: https://huggingface.co/datasets/{repo_id}')
          "

  finetune-model:
    name: Fine-tune Qwen Model (QLoRA via Kaggle GPU)
    needs: upload-to-huggingface
    runs-on: ubuntu-latest
    timeout-minutes: 180  # Kaggle T4 GPU — ~1-2hrs for 1.5B QLoRA
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          # Extract username for kernel ID
          KAGGLE_USER=$(python -c "import json; print(json.load(open('$HOME/.kaggle/kaggle.json'))['username'])")
          echo "KAGGLE_USER=$KAGGLE_USER" >> $GITHUB_ENV

      - name: Create Kaggle training notebook
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p kaggle_kernel

          # Kernel metadata — enables GPU accelerator
          cat > kaggle_kernel/kernel-metadata.json << 'METADATA'
          {
            "id": "${{ env.KAGGLE_USER }}/rigour-qlora-finetune",
            "title": "Rigour QLoRA Fine-tune",
            "code_file": "finetune_kaggle.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "competition_sources": [],
            "dataset_sources": []
          }
          METADATA

          # Replace placeholder username in metadata
          sed -i "s/\${{ env.KAGGLE_USER }}/${KAGGLE_USER}/g" kaggle_kernel/kernel-metadata.json

          # Training script that runs ON Kaggle's T4 GPU
          cat > kaggle_kernel/finetune_kaggle.py << 'TRAINSCRIPT'
          """Rigour QLoRA fine-tune — runs on Kaggle T4 GPU.
          Downloads training data from HuggingFace, fine-tunes, uploads merged model back."""
          import os, subprocess, sys

          # Install dependencies on Kaggle runtime
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-q",
              "trl>=0.15", "peft", "bitsandbytes", "datasets", "huggingface_hub",
              "accelerate", "transformers>=4.46"])

          import torch
          print(f"GPU available: {torch.cuda.is_available()}")
          if torch.cuda.is_available():
              print(f"GPU: {torch.cuda.get_device_name(0)}")
              print(f"VRAM: {torch.cuda.get_device_properties(0).total_mem / 1e9:.1f} GB")

          from huggingface_hub import HfApi, hf_hub_download
          from datasets import load_dataset

          HF_TOKEN = os.environ.get("HF_TOKEN", "")
          DATASET_ID = "rigour-labs/rigour-rlaif-data"
          OUTPUT_DIR = "/kaggle/working/rigour-v1"

          # ── Download training data from HuggingFace ──
          print("Downloading training data from HuggingFace...")
          sft_path = hf_hub_download(DATASET_ID, "sft_data.jsonl", repo_type="dataset", token=HF_TOKEN)
          dpo_path = hf_hub_download(DATASET_ID, "dpo_data.jsonl", repo_type="dataset", token=HF_TOKEN)

          sft_ds = load_dataset("json", data_files=sft_path, split="train")
          dpo_ds = load_dataset("json", data_files=dpo_path, split="train")
          print(f"SFT: {len(sft_ds)} examples, DPO: {len(dpo_ds)} pairs")

          # ── Setup model + QLoRA ──
          from transformers import AutoModelForCausalLM, AutoTokenizer, BitsAndBytesConfig
          from peft import LoraConfig, get_peft_model, prepare_model_for_kbit_training

          BASE_MODEL = "Qwen/Qwen2.5-Coder-1.5B-Instruct"
          print(f"Loading {BASE_MODEL}...")

          tokenizer = AutoTokenizer.from_pretrained(BASE_MODEL)
          if tokenizer.pad_token is None:
              tokenizer.pad_token = tokenizer.eos_token

          compute_dtype = torch.bfloat16 if torch.cuda.is_bf16_supported() else torch.float16
          model = AutoModelForCausalLM.from_pretrained(
              BASE_MODEL,
              device_map="auto",
              trust_remote_code=True,
              quantization_config=BitsAndBytesConfig(
                  load_in_4bit=True,
                  bnb_4bit_quant_type="nf4",
                  bnb_4bit_compute_dtype=compute_dtype,
                  bnb_4bit_use_double_quant=True,
              ),
          )
          model = prepare_model_for_kbit_training(model)

          lora_config = LoraConfig(
              r=16, lora_alpha=32, lora_dropout=0.05,
              target_modules=["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"],
              bias="none", task_type="CAUSAL_LM",
          )
          model = get_peft_model(model, lora_config)
          trainable = sum(p.numel() for p in model.parameters() if p.requires_grad)
          total = sum(p.numel() for p in model.parameters())
          print(f"Trainable: {trainable:,} / {total:,} ({100*trainable/total:.1f}%)")

          # ── SFT Phase ──
          if len(sft_ds) > 0:
              from trl import SFTTrainer, SFTConfig
              use_bf16 = torch.cuda.is_bf16_supported()
              dtype_args = {"bf16": True} if use_bf16 else {"fp16": True}
              steps_per_epoch = max(1, len(sft_ds) // (4 * 4))
              sft_args = SFTConfig(
                  output_dir=os.path.join(OUTPUT_DIR, "sft"),
                  num_train_epochs=3,
                  per_device_train_batch_size=4,
                  gradient_accumulation_steps=4,
                  learning_rate=2e-4,
                  warmup_steps=max(1, int(steps_per_epoch * 3 * 0.1)),
                  logging_steps=10,
                  save_strategy="epoch",
                  max_length=1024,
                  **dtype_args,
              )
              trainer = SFTTrainer(model=model, tokenizer=tokenizer, train_dataset=sft_ds, args=sft_args)
              trainer.train()
              print("SFT complete")

          # ── DPO Phase ──
          if len(dpo_ds) > 0:
              from trl import DPOTrainer, DPOConfig
              use_bf16 = torch.cuda.is_bf16_supported()
              dtype_args = {"bf16": True} if use_bf16 else {"fp16": True}
              steps_per_epoch = max(1, len(dpo_ds) // (2 * 8))
              dpo_args = DPOConfig(
                  output_dir=os.path.join(OUTPUT_DIR, "dpo"),
                  num_train_epochs=1,
                  per_device_train_batch_size=2,
                  gradient_accumulation_steps=8,
                  learning_rate=5e-5,
                  warmup_steps=max(1, int(steps_per_epoch * 0.1)),
                  logging_steps=10,
                  save_strategy="epoch",
                  max_length=1024,
                  max_prompt_length=512,
                  beta=0.1,
                  **dtype_args,
              )
              trainer = DPOTrainer(model=model, tokenizer=tokenizer, train_dataset=dpo_ds, args=dpo_args)
              trainer.train()
              print("DPO complete")

          # ── Merge LoRA + Upload to HuggingFace ──
          print("Merging LoRA adapter...")
          merged = model.merge_and_unload()
          merged_path = os.path.join(OUTPUT_DIR, "merged")
          merged.save_pretrained(merged_path)
          tokenizer.save_pretrained(merged_path)

          if HF_TOKEN:
              print("Uploading merged model to HuggingFace...")
              api = HfApi(token=HF_TOKEN)
              api.create_repo("rigour-labs/rigour-deep-v1-merged", exist_ok=True, token=HF_TOKEN)
              api.upload_folder(
                  folder_path=merged_path,
                  repo_id="rigour-labs/rigour-deep-v1-merged",
                  commit_message=f"QLoRA fine-tune: SFT={len(sft_ds)} DPO={len(dpo_ds)}",
              )
              print("✓ Merged model uploaded to rigour-labs/rigour-deep-v1-merged")
          else:
              print("WARNING: No HF_TOKEN — model saved locally only")

          print("Fine-tuning complete!")
          TRAINSCRIPT

      - name: Set HF_TOKEN as Kaggle user secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Kaggle kernels can't access GitHub secrets directly.
          # We inject HF_TOKEN as a Kaggle user secret via the API.
          python -c "
          import os, json, urllib.request

          kaggle_creds = json.load(open(os.path.expanduser('~/.kaggle/kaggle.json')))
          username = kaggle_creds['username']
          api_key  = kaggle_creds['key']

          # Kaggle Secrets API — set HF_TOKEN for kernel access
          import base64
          auth = base64.b64encode(f'{username}:{api_key}'.encode()).decode()
          headers = {
              'Authorization': f'Basic {auth}',
              'Content-Type': 'application/json',
          }

          # Use kaggle-api-compatible env variable injection in kernel metadata
          # Kaggle kernels get secrets from 'kaggle_secrets' library
          print('HF_TOKEN will be available in kernel via kaggle_secrets or env var injection')
          "

          # Write HF_TOKEN into the training script as environment variable
          # This is the most reliable method — inject directly into the script
          sed -i "s|HF_TOKEN = os.environ.get(\"HF_TOKEN\", \"\")|HF_TOKEN = \"${HF_TOKEN}\"|" kaggle_kernel/finetune_kaggle.py

      - name: Push kernel to Kaggle + run on GPU
        run: |
          cd kaggle_kernel
          kaggle kernels push -p .
          echo "Kernel pushed to Kaggle. Waiting for GPU execution..."

      - name: Poll Kaggle kernel until complete
        run: |
          KERNEL_ID="${KAGGLE_USER}/rigour-qlora-finetune"
          MAX_WAIT=7200  # 2 hours max
          INTERVAL=60    # Check every minute
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(kaggle kernels status "$KERNEL_ID" 2>&1 || echo "error")
            echo "[$(date +%H:%M:%S)] Status: $STATUS"

            if echo "$STATUS" | grep -qi "complete"; then
              echo "✓ Kaggle kernel completed successfully!"
              exit 0
            fi

            if echo "$STATUS" | grep -qi "error\|cancel"; then
              echo "✗ Kaggle kernel failed!"
              kaggle kernels output "$KERNEL_ID" -p kaggle_output/ || true
              cat kaggle_output/*.log 2>/dev/null || true
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "✗ Timeout waiting for Kaggle kernel"
          exit 1

      - name: Verify model uploaded to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          files = api.list_repo_files('rigour-labs/rigour-deep-v1-merged')
          print(f'Merged model files: {len(files)}')
          for f in files:
              print(f'  {f}')
          assert any('model' in f or 'safetensors' in f for f in files), 'No model files found!'
          print('✓ Merged model verified on HuggingFace')
          "

  export-and-upload-gguf:
    name: Export GGUF + Upload to HuggingFace
    needs: finetune-model
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install huggingface_hub transformers torch

      - name: Clone llama.cpp and build
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          pip install -r requirements.txt || true
          cmake -B build && cmake --build build --config Release -j

      - name: Download merged model from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import snapshot_download

          print('Downloading merged model from HuggingFace...')
          snapshot_download(
              'rigour-labs/rigour-deep-v1-merged',
              local_dir='rlaif/models/rigour-v1/merged',
              token=os.environ['HF_TOKEN'],
          )
          print('✓ Model downloaded')
          "

      - name: Convert to GGUF + quantize
        run: |
          python -m rlaif.export_gguf \
            --model rlaif/models/rigour-v1/merged \
            --output rlaif/models/rigour-v1 \
            --llama-cpp-path llama.cpp \
            --version 1

      - name: Upload GGUF to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os, glob
          from rlaif.export_gguf import upload_to_huggingface
          gguf_files = glob.glob('rlaif/models/rigour-v1/*.gguf')
          gguf_files = [f for f in gguf_files if 'f16' not in f]
          if gguf_files:
              upload_to_huggingface(
                  gguf_files[0],
                  'rigour-labs/rigour-deep-v1-gguf',
                  version='1', tier='deep',
              )
          else:
              print('ERROR: No quantized GGUF found')
              exit(1)
          "

      - name: Upload GGUF artifact
        uses: actions/upload-artifact@v4
        with:
          name: gguf-model-${{ github.run_id }}
          path: rlaif/models/rigour-v1/*.gguf
          retention-days: 30

  run-driftbench-eval:
    name: Validate with DriftBench
    needs: generate-training-data
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g @rigour-labs/cli || true

      - name: Run DriftBench evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHERAI_API_KEY: ${{ secrets.TOGETHERAI_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROVIDER="${{ inputs.model_provider || 'anthropic' }}"
          MODEL_NAME="${{ inputs.model_name || 'claude-sonnet-4-6' }}"
          python scripts/run_full_benchmark.py \
            --model "${PROVIDER}/${MODEL_NAME}" \
            -p 4 \
            --clean

      - name: Generate leaderboard with per-category scoring
        run: python scripts/snapshot_leaderboard.py

      - name: Upload DriftBench results
        uses: actions/upload-artifact@v4
        with:
          name: driftbench-results-${{ github.run_id }}
          path: results/
          retention-days: 90
