name: Training Pipeline (Batch API + Lightning.ai GPU)

on:
  # Weekly schedule: Sunday 11 PM IST = Sunday 5:30 PM UTC
  schedule:
    - cron: '30 17 * * 0'

  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated repos (owner/repo) or "all" for training list'
        required: false
        default: 'all'
      teacher_strategy:
        description: 'Teacher selection: "multi" = all 3 teachers (Option A), "tournament" = best teacher per category (Option C), "single" = one teacher only'
        required: false
        type: choice
        options:
          - multi
          - tournament
          - single
        default: 'multi'
      teachers:
        description: 'Comma-separated teachers as provider:model (e.g., "anthropic:claude-sonnet-4-6"). For single strategy, pass just one.'
        required: false
        default: 'anthropic:claude-sonnet-4-6,openai:gpt-4o,together_ai:meta-llama/Llama-3.3-70B-Instruct-Turbo'
      training_tiers:
        description: 'Which model tiers to train: "both", "deep", or "lite"'
        required: false
        type: choice
        options:
          - both
          - deep
          - lite
        default: 'both'
      start_from:
        description: 'Start pipeline from this stage (skip earlier stages). "generate" = full run, "finetune" = skip data gen, "export" = skip data gen + finetune'
        required: false
        type: choice
        options:
          - generate
          - finetune
          - export
        default: 'generate'
      use_batch_api:
        description: 'Use Batch API where available (50% cheaper, async)'
        required: false
        type: boolean
        default: true
      enable_retry:
        description: 'Enable Pass@2 retry for rejected findings (15-20% more verified data)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  MODEL_VERSION: ${{ github.run_number }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: Generate RLAIF Training Data (Batch API — 50% cheaper)
  # ═══════════════════════════════════════════════════════════════
  generate-training-data:
    name: Generate Training Data (Batch API)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      has_training_data: ${{ steps.check-data.outputs.has_data }}
      sft_count: ${{ steps.check-data.outputs.sft_count }}
      dpo_count: ${{ steps.check-data.outputs.dpo_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install litellm huggingface_hub anthropic

      - name: Generate training data (multi-teacher)
        if: ${{ inputs.start_from == 'generate' || inputs.start_from == '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHERAI_API_KEY: ${{ secrets.TOGETHERAI_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          REPOS_INPUT="${{ inputs.repos || 'all' }}"
          ENABLE_RETRY="${{ inputs.enable_retry || 'true' }}"
          USE_BATCH="${{ inputs.use_batch_api || 'true' }}"
          STRATEGY="${{ inputs.teacher_strategy || 'multi' }}"

          RETRY_FLAG=""
          if [ "$ENABLE_RETRY" = "false" ]; then
            RETRY_FLAG="--no-retry"
          fi

          # ─── Build teacher list based on strategy ───
          if [ "$STRATEGY" = "single" ]; then
            # Single teacher mode — just use first entry from teachers input
            TEACHERS_INPUT="${{ inputs.teachers || 'anthropic:claude-sonnet-4-6' }}"
            IFS=',' read -ra TEACHERS <<< "$TEACHERS_INPUT"
            TEACHERS=("${TEACHERS[0]}")
            echo "Strategy: SINGLE teacher → ${TEACHERS[0]}"

          elif [ "$STRATEGY" = "tournament" ]; then
            # Tournament mode (Option C) — pick best teacher per category
            # Downloads teacher_scores.json from HF and routes accordingly
            echo "Strategy: TOURNAMENT — routing best teacher per category"
            TEACHERS_INPUT="${{ inputs.teachers || 'anthropic:claude-sonnet-4-6,openai:gpt-4o,together_ai:meta-llama/Llama-3.3-70B-Instruct-Turbo' }}"
            IFS=',' read -ra TEACHERS <<< "$TEACHERS_INPUT"

            # Download historical teacher scores for routing
            python3 -c "
          import os, json
          os.makedirs('rlaif/data', exist_ok=True)
          try:
              from huggingface_hub import hf_hub_download
              path = hf_hub_download('rigour-labs/rigour-rlaif-data', 'metrics_history.json',
                                     repo_type='dataset', token=os.environ.get('HF_TOKEN', ''))
              with open(path) as f:
                  history = json.load(f)
              # Average teacher scores across last 4 runs
              recent = history.get('runs', [])[-4:]
              agg = {}
              for run in recent:
                  for teacher, cats in run.get('teacher_scores', {}).items():
                      if teacher not in agg:
                          agg[teacher] = {}
                      for cat, rate in cats.items():
                          if cat not in agg[teacher]:
                              agg[teacher][cat] = []
                          agg[teacher][cat].append(rate)
              # Pick best teacher per category
              routing = {}
              categories = set()
              for t in agg:
                  categories.update(agg[t].keys())
              for cat in categories:
                  best_teacher = None
                  best_rate = -1
                  for t in agg:
                      avg = sum(agg[t].get(cat, [0])) / len(agg[t].get(cat, [1]))
                      if avg > best_rate:
                          best_rate = avg
                          best_teacher = t
                  routing[cat] = {'teacher': best_teacher, 'rate': round(best_rate, 3)}
              with open('rlaif/data/tournament_routing.json', 'w') as f:
                  json.dump(routing, f, indent=2)
              print('Tournament routing:')
              for cat, info in sorted(routing.items()):
                  print(f'  {cat} → {info[\"teacher\"]} ({info[\"rate\"]:.1%})')
          except Exception as e:
              print(f'WARNING: Could not load teacher history ({e}), falling back to multi')
              with open('rlaif/data/tournament_routing.json', 'w') as f:
                  json.dump({}, f)
          "

          else
            # Multi mode (Option A, default) — all teachers run on everything
            echo "Strategy: MULTI — all teachers generate data (union)"
            TEACHERS_INPUT="${{ inputs.teachers || 'anthropic:claude-sonnet-4-6,openai:gpt-4o,together_ai:meta-llama/Llama-3.3-70B-Instruct-Turbo' }}"
            IFS=',' read -ra TEACHERS <<< "$TEACHERS_INPUT"
          fi

          # ─── Run each teacher ───
          for TEACHER in "${TEACHERS[@]}"; do
            IFS=':' read -r PROVIDER MODEL_NAME <<< "$TEACHER"
            echo ""
            echo "════════════════════════════════════════"
            echo "Teacher: $PROVIDER / $MODEL_NAME"
            echo "════════════════════════════════════════"

            COMMON_ARGS="--provider $PROVIDER --model-name $MODEL_NAME --output rlaif/data --workspace .rlaif_repos"

            # Batch API only implemented for Anthropic — others run live
            BATCH_FLAG=""
            if [ "$USE_BATCH" = "true" ] && [ "$PROVIDER" = "anthropic" ]; then
              BATCH_FLAG="--batch"
            fi

            if [ "$REPOS_INPUT" = "all" ]; then
              python -m rlaif.generate \
                --repos rlaif/repos_training.json \
                $COMMON_ARGS $BATCH_FLAG $RETRY_FLAG || {
                echo "WARNING: Teacher $TEACHER failed, continuing with next teacher"
                continue
              }
            else
              IFS=',' read -ra REPOS <<< "$REPOS_INPUT"
              for repo in "${REPOS[@]}"; do
                repo=$(echo "$repo" | xargs)
                python -m rlaif.generate \
                  --repo "$repo" \
                  $COMMON_ARGS $BATCH_FLAG $RETRY_FLAG || true
              done
            fi
          done

      - name: Collect batch results (poll until complete)
        if: ${{ (inputs.start_from == 'generate' || inputs.start_from == '') && (inputs.use_batch_api != false) }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          if [ -f rlaif/data/pending_batches.json ]; then
            echo "Polling for batch completion (may take up to 1 hour)..."
            python -m rlaif.generate --batch-collect-all --output rlaif/data || {
              echo "ERROR: Batch collection failed"
              exit 1
            }
          else
            echo "No pending batches found (live mode was used)"
          fi

      - name: Format DPO training pairs
        run: |
          set -e
          if [ ! -f rlaif/data/training_data.db ]; then
            echo "SKIP: No training database found (generation may have been skipped)"
            exit 0
          fi
          python -m rlaif.format_dpo \
            --db rlaif/data/training_data.db \
            --output rlaif/data \
            --max-dpo-pairs 10000

      - name: Check training data output
        id: check-data
        run: |
          SFT_COUNT=0
          DPO_COUNT=0
          HAS_DATA="false"

          if [ -f rlaif/data/sft_data.jsonl ]; then
            SFT_COUNT=$(wc -l < rlaif/data/sft_data.jsonl | tr -d ' ')
          fi
          if [ -f rlaif/data/dpo_data.jsonl ]; then
            DPO_COUNT=$(wc -l < rlaif/data/dpo_data.jsonl | tr -d ' ')
          fi

          if [ "$SFT_COUNT" -gt 0 ] || [ "$DPO_COUNT" -gt 0 ]; then
            HAS_DATA="true"
          fi

          echo "sft_count=$SFT_COUNT" >> $GITHUB_OUTPUT
          echo "dpo_count=$DPO_COUNT" >> $GITHUB_OUTPUT
          echo "has_data=$HAS_DATA" >> $GITHUB_OUTPUT

          echo "=== Training Data Statistics ==="
          echo "SFT pairs:  $SFT_COUNT"
          echo "DPO pairs:  $DPO_COUNT"
          echo "Has data:   $HAS_DATA"

          if [ -f rlaif/data/category_stats.json ]; then
            python3 scripts/print_stats.py rlaif/data/category_stats.json
          fi

      - name: Compute teacher scores + update metrics history
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/update_metrics_history.py \
            --stats rlaif/data/category_stats.json \
            --db rlaif/data/training_data.db \
            --run-number "${{ env.MODEL_VERSION }}" \
            --hf-repo rigour-labs/rigour-rlaif-data || {
            echo "WARNING: Metrics history update failed (non-fatal)"
          }

      - name: Upload training data artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlaif-training-data-${{ github.run_id }}
          path: |
            rlaif/data/sft_data.jsonl
            rlaif/data/dpo_data.jsonl
            rlaif/data/category_stats.json
            rlaif/data/generate_summary.json
            rlaif/data/teacher_scores.json
            rlaif/data/README.md
          if-no-files-found: warn
          retention-days: 90

      - name: Upload SQLite DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlaif-database-${{ github.run_id }}
          path: rlaif/data/training_data.db
          if-no-files-found: warn
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════
  # Job 2: Upload to HuggingFace Datasets
  # ═══════════════════════════════════════════════════════════════
  upload-to-huggingface:
    name: Upload to HuggingFace Datasets
    needs: generate-training-data
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.generate-training-data.outputs.has_training_data == 'true' &&
      (inputs.start_from == 'generate' || inputs.start_from == '')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Download training data artifact
        uses: actions/download-artifact@v4
        with:
          name: rlaif-training-data-${{ github.run_id }}
          path: rlaif/data/

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi, create_repo

          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = 'rigour-labs/rigour-rlaif-data'

          try:
              create_repo(repo_id, repo_type='dataset', token=os.environ['HF_TOKEN'], exist_ok=True)
          except Exception as e:
              print(f'Repo creation error: {e}')
              if 'already' not in str(e).lower() and 'exist' not in str(e).lower():
                  print('FATAL: Cannot create/access HuggingFace repo')
                  exit(1)

          files_to_upload = [
              'rlaif/data/sft_data.jsonl',
              'rlaif/data/dpo_data.jsonl',
              'rlaif/data/category_stats.json',
              'rlaif/data/README.md',
          ]

          uploaded = 0
          for filepath in files_to_upload:
              if os.path.exists(filepath):
                  filename = os.path.basename(filepath)
                  print(f'Uploading {filename}...')
                  api.upload_file(
                      path_or_fileobj=filepath,
                      path_in_repo=filename,
                      repo_id=repo_id,
                      repo_type='dataset',
                  )
                  uploaded += 1
                  print(f'  done')

          if uploaded == 0:
              print('WARNING: No files uploaded')
              exit(1)
          print(f'Dataset: https://huggingface.co/datasets/{repo_id}')
          "

  # ═══════════════════════════════════════════════════════════════
  # Job 3: Fine-tune on Lightning.ai GPU (FREE 7-22 hrs/month)
  # ═══════════════════════════════════════════════════════════════
  finetune-model:
    name: Fine-tune ${{ matrix.tier }} Model (QLoRA)
    needs: upload-to-huggingface
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      inputs.start_from != 'export' &&
      (needs.upload-to-huggingface.result == 'success' || inputs.start_from == 'finetune')
    strategy:
      matrix:
        tier: [deep, lite]
      fail-fast: false
    # Lightning.ai GPU runner — set up via:
    #   1. Create account at lightning.ai
    #   2. Settings → CI/CD Runners → Connect to GitHub
    #   3. Replace label below with your runner label
    # Fallback: runs-on ubuntu-latest (CPU-only, slower but works)
    runs-on: ${{ vars.GPU_RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 240

    steps:
      - name: Check tier filter
        id: tier-check
        run: |
          TIERS="${{ inputs.training_tiers }}"
          TIER="${{ matrix.tier }}"
          if [ "$TIERS" = "both" ] || [ "$TIERS" = "" ] || [ "$TIERS" = "$TIER" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping $TIER tier (training_tiers=$TIERS)"
          fi

      - name: Checkout repository
        if: steps.tier-check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.tier-check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install training dependencies
        if: steps.tier-check.outputs.skip != 'true'
        run: |
          pip install torch transformers peft trl datasets \
                      bitsandbytes huggingface_hub accelerate

      - name: Download training data from HuggingFace
        if: steps.tier-check.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import hf_hub_download
          token = os.environ['HF_TOKEN']
          for f in ['sft_data.jsonl', 'dpo_data.jsonl']:
              try:
                  path = hf_hub_download('rigour-labs/rigour-rlaif-data', f, repo_type='dataset', token=token)
                  print(f'Downloaded {f}: {path}')
              except Exception as e:
                  print(f'Warning: {f} not found: {e}')
          "

      - name: Run QLoRA fine-tuning
        if: steps.tier-check.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TIER: ${{ matrix.tier }}
          VERSION: ${{ env.MODEL_VERSION }}
        run: |
          python -c "
          import os, sys, torch

          TIER = os.environ.get('TIER', 'deep')
          VERSION = os.environ.get('VERSION', '1')
          print(f'Training tier={TIER} version=v{VERSION}')

          print(f'GPU available: {torch.cuda.is_available()}')
          if torch.cuda.is_available():
              print(f'GPU: {torch.cuda.get_device_name(0)}')
              print(f'VRAM: {torch.cuda.get_device_properties(0).total_memory / 1e9:.1f} GB')
          else:
              print('WARNING: No GPU — training will be slow on CPU')

          from huggingface_hub import hf_hub_download
          from datasets import load_dataset

          HF_TOKEN = os.environ.get('HF_TOKEN', '')
          DATASET_ID = 'rigour-labs/rigour-rlaif-data'
          OUTPUT_DIR = f'rlaif/models/rigour-{TIER}-v{VERSION}'

          # Tier-specific configuration
          TIER_CONFIG = {
              'deep': {
                  'base_model': 'Qwen/Qwen2.5-Coder-1.5B-Instruct',
                  'sft_epochs': 3, 'sft_batch': 4, 'sft_grad_accum': 4,
                  'dpo_epochs': 1, 'dpo_batch': 2, 'dpo_grad_accum': 8,
                  'max_length': 1024, 'lr_sft': 2e-4, 'lr_dpo': 5e-5,
              },
              'lite': {
                  'base_model': 'Qwen/Qwen2.5-Coder-0.5B-Instruct',
                  'sft_epochs': 2, 'sft_batch': 8, 'sft_grad_accum': 2,
                  'dpo_epochs': 1, 'dpo_batch': 4, 'dpo_grad_accum': 4,
                  'max_length': 768, 'lr_sft': 3e-4, 'lr_dpo': 8e-5,
              },
          }
          cfg = TIER_CONFIG[TIER]
          BASE_MODEL = cfg['base_model']

          # Download training data
          print('Downloading training data...')
          sft_path = hf_hub_download(DATASET_ID, 'sft_data.jsonl', repo_type='dataset', token=HF_TOKEN)
          dpo_path = hf_hub_download(DATASET_ID, 'dpo_data.jsonl', repo_type='dataset', token=HF_TOKEN)

          sft_ds = load_dataset('json', data_files=sft_path, split='train')
          dpo_ds = load_dataset('json', data_files=dpo_path, split='train')
          print(f'SFT: {len(sft_ds)} examples, DPO: {len(dpo_ds)} pairs')

          if len(sft_ds) == 0 and len(dpo_ds) == 0:
              print('No training data — skipping')
              sys.exit(0)

          # Load model + QLoRA
          from transformers import AutoModelForCausalLM, AutoTokenizer, BitsAndBytesConfig
          from peft import LoraConfig, get_peft_model, prepare_model_for_kbit_training

          print(f'Loading {BASE_MODEL} (tier={TIER})...')

          tokenizer = AutoTokenizer.from_pretrained(BASE_MODEL)
          if tokenizer.pad_token is None:
              tokenizer.pad_token = tokenizer.eos_token

          load_kwargs = {'device_map': 'auto', 'trust_remote_code': True}
          if torch.cuda.is_available():
              compute_dtype = torch.bfloat16 if torch.cuda.is_bf16_supported() else torch.float16
              load_kwargs['quantization_config'] = BitsAndBytesConfig(
                  load_in_4bit=True,
                  bnb_4bit_quant_type='nf4',
                  bnb_4bit_compute_dtype=compute_dtype,
                  bnb_4bit_use_double_quant=True,
              )
          else:
              load_kwargs['torch_dtype'] = torch.float32

          model = AutoModelForCausalLM.from_pretrained(BASE_MODEL, **load_kwargs)
          if torch.cuda.is_available():
              model = prepare_model_for_kbit_training(model)

          lora_config = LoraConfig(
              r=16, lora_alpha=32, lora_dropout=0.05,
              target_modules=['q_proj', 'k_proj', 'v_proj', 'o_proj', 'gate_proj', 'up_proj', 'down_proj'],
              bias='none', task_type='CAUSAL_LM',
          )
          model = get_peft_model(model, lora_config)
          trainable = sum(p.numel() for p in model.parameters() if p.requires_grad)
          total = sum(p.numel() for p in model.parameters())
          print(f'Trainable: {trainable:,} / {total:,} ({100*trainable/total:.1f}%)')

          # SFT Phase
          if len(sft_ds) > 0:
              from trl import SFTTrainer, SFTConfig
              use_bf16 = torch.cuda.is_available() and torch.cuda.is_bf16_supported()
              dtype_args = {'bf16': True} if use_bf16 else ({'fp16': True} if torch.cuda.is_available() else {})
              steps_per_epoch = max(1, len(sft_ds) // (cfg['sft_batch'] * cfg['sft_grad_accum']))
              sft_args = SFTConfig(
                  output_dir=os.path.join(OUTPUT_DIR, 'sft'),
                  num_train_epochs=cfg['sft_epochs'],
                  per_device_train_batch_size=cfg['sft_batch'],
                  gradient_accumulation_steps=cfg['sft_grad_accum'],
                  learning_rate=cfg['lr_sft'],
                  warmup_steps=max(1, int(steps_per_epoch * cfg['sft_epochs'] * 0.1)),
                  logging_steps=10,
                  save_strategy='epoch',
                  max_length=cfg['max_length'],
                  **dtype_args,
              )
              trainer = SFTTrainer(model=model, processing_class=tokenizer, train_dataset=sft_ds, args=sft_args)
              trainer.train()
              print('SFT complete')

          # DPO Phase
          if len(dpo_ds) > 0:
              from trl import DPOTrainer, DPOConfig
              tokenizer.padding_side = 'left'  # Required by DPOTrainer
              use_bf16 = torch.cuda.is_available() and torch.cuda.is_bf16_supported()
              dtype_args = {'bf16': True} if use_bf16 else ({'fp16': True} if torch.cuda.is_available() else {})
              steps_per_epoch = max(1, len(dpo_ds) // (cfg['dpo_batch'] * cfg['dpo_grad_accum']))
              dpo_args = DPOConfig(
                  output_dir=os.path.join(OUTPUT_DIR, 'dpo'),
                  num_train_epochs=cfg['dpo_epochs'],
                  per_device_train_batch_size=cfg['dpo_batch'],
                  gradient_accumulation_steps=cfg['dpo_grad_accum'],
                  learning_rate=cfg['lr_dpo'],
                  warmup_steps=max(1, int(steps_per_epoch * 0.1)),
                  logging_steps=10,
                  save_strategy='epoch',
                  max_length=cfg['max_length'],
                  beta=0.1,
                  **dtype_args,
              )
              trainer = DPOTrainer(model=model, processing_class=tokenizer, train_dataset=dpo_ds, args=dpo_args)
              trainer.train()
              print('DPO complete')

          # Save LoRA adapter, then reload base in fp16 and merge cleanly
          # (QLoRA weights can't be converted to GGUF directly)
          print('Saving LoRA adapter...')
          adapter_path = os.path.join(OUTPUT_DIR, 'adapter')
          model.save_pretrained(adapter_path)
          tokenizer.save_pretrained(adapter_path)

          # Free GPU memory
          del model
          if torch.cuda.is_available():
              torch.cuda.empty_cache()

          print(f'Reloading {BASE_MODEL} in fp16 on CPU for clean merge...')
          from peft import PeftModel
          base_model = AutoModelForCausalLM.from_pretrained(
              BASE_MODEL, torch_dtype=torch.float16, device_map='cpu',
              trust_remote_code=True,
          )
          merged = PeftModel.from_pretrained(base_model, adapter_path)
          merged = merged.merge_and_unload()

          merged_path = os.path.join(OUTPUT_DIR, 'merged')
          merged.save_pretrained(merged_path)
          tokenizer.save_pretrained(merged_path)
          print('Merged model saved in fp16')

          REPO_ID = f'rigour-labs/rigour-{TIER}-v{VERSION}-merged'
          if HF_TOKEN:
              from huggingface_hub import HfApi
              print(f'Uploading merged model to {REPO_ID}...')
              api = HfApi(token=HF_TOKEN)
              api.create_repo(REPO_ID, exist_ok=True, repo_type='model')
              api.upload_folder(
                  folder_path=merged_path,
                  repo_id=REPO_ID,
                  commit_message=f'QLoRA fine-tune v{VERSION}: tier={TIER} SFT={len(sft_ds)} DPO={len(dpo_ds)}',
              )
              print(f'Model uploaded: https://huggingface.co/{REPO_ID}')

          print(f'Fine-tuning complete! tier={TIER} version=v{VERSION}')
          "

      - name: Verify model on HuggingFace
        if: steps.tier-check.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TIER: ${{ matrix.tier }}
          VERSION: ${{ env.MODEL_VERSION }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          tier = os.environ.get('TIER', 'deep')
          version = os.environ.get('VERSION', '1')
          repo_id = f'rigour-labs/rigour-{tier}-v{version}-merged'
          api = HfApi(token=os.environ['HF_TOKEN'])
          files = api.list_repo_files(repo_id)
          print(f'Merged model files ({repo_id}): {len(files)}')
          for f in files:
              print(f'  {f}')
          assert any('model' in f or 'safetensors' in f for f in files), 'No model files found!'
          print(f'Model verified: {repo_id}')
          "

  # ═══════════════════════════════════════════════════════════════
  # Job 4: Export GGUF + Upload to HuggingFace
  # ═══════════════════════════════════════════════════════════════
  export-gguf:
    name: Export GGUF (${{ matrix.tier }}) + Upload
    needs: finetune-model
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.finetune-model.result == 'success' || inputs.start_from == 'export')
    strategy:
      matrix:
        tier: [deep, lite]
      fail-fast: false

    steps:
      - name: Check tier filter
        id: tier-check
        run: |
          TIERS="${{ inputs.training_tiers }}"
          TIER="${{ matrix.tier }}"
          if [ "$TIERS" = "both" ] || [ "$TIERS" = "" ] || [ "$TIERS" = "$TIER" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping $TIER tier (training_tiers=$TIERS)"
          fi

      - name: Checkout repository
        if: steps.tier-check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.tier-check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        if: steps.tier-check.outputs.skip != 'true'
        run: pip install huggingface_hub transformers torch

      - name: Clone llama.cpp and build
        if: steps.tier-check.outputs.skip != 'true'
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          pip install -r requirements.txt || true
          cmake -B build || { echo "ERROR: cmake configure failed"; exit 1; }
          cmake --build build --config Release -j || { echo "ERROR: cmake build failed"; exit 1; }

      - name: Download merged model from HuggingFace
        if: steps.tier-check.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TIER: ${{ matrix.tier }}
          VERSION: ${{ env.MODEL_VERSION }}
        run: |
          python -c "
          import os
          from huggingface_hub import snapshot_download
          tier = os.environ.get('TIER', 'deep')
          version = os.environ.get('VERSION', '1')
          repo_id = f'rigour-labs/rigour-{tier}-v{version}-merged'
          local_dir = f'rlaif/models/rigour-{tier}-v{version}/merged'
          print(f'Downloading {repo_id}...')
          snapshot_download(repo_id, local_dir=local_dir, token=os.environ['HF_TOKEN'])
          print('Model downloaded')
          "

      - name: Convert to GGUF + quantize
        if: steps.tier-check.outputs.skip != 'true'
        env:
          TIER: ${{ matrix.tier }}
          VERSION: ${{ env.MODEL_VERSION }}
        run: |
          TIER_FLAG=""
          if [ "$TIER" = "lite" ]; then
            TIER_FLAG="--lite"
          elif [ "$TIER" = "legacy" ]; then
            TIER_FLAG="--legacy"
          fi
          python -m rlaif.export_gguf \
            --model "rlaif/models/rigour-${TIER}-v${VERSION}/merged" \
            --output "rlaif/models/rigour-${TIER}-v${VERSION}" \
            --llama-cpp-path llama.cpp \
            --version "$VERSION" \
            $TIER_FLAG

      - name: Upload GGUF to HuggingFace
        if: steps.tier-check.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TIER: ${{ matrix.tier }}
          VERSION: ${{ env.MODEL_VERSION }}
        run: |
          python -c "
          import os, glob
          from rlaif.export_gguf import upload_to_huggingface
          tier = os.environ.get('TIER', 'deep')
          version = os.environ.get('VERSION', '1')
          pattern = f'rlaif/models/rigour-{tier}-v{version}/*.gguf'
          gguf_files = glob.glob(pattern)
          gguf_files = [f for f in gguf_files if 'f16' not in f]
          if gguf_files:
              upload_to_huggingface(
                  gguf_files[0],
                  f'rigour-labs/rigour-{tier}-v{version}-gguf',
                  version=version, tier=tier,
              )
          else:
              print('ERROR: No quantized GGUF found')
              exit(1)
          "

      - name: Upload GGUF artifact
        if: steps.tier-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gguf-${{ matrix.tier }}-${{ github.run_id }}
          path: rlaif/models/rigour-${{ matrix.tier }}-v${{ env.MODEL_VERSION }}/*.gguf
          if-no-files-found: warn
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # Job 5: Evaluate Model + Regression Gate
  # ═══════════════════════════════════════════════════════════════
  evaluate-model:
    name: Evaluate ${{ matrix.tier }} Model
    needs: export-gguf
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.ref == 'refs/heads/main'
    strategy:
      matrix:
        tier: [deep, lite]
      fail-fast: false

    steps:
      - name: Check tier filter
        id: tier-check
        run: |
          TIERS="${{ inputs.training_tiers }}"
          TIER="${{ matrix.tier }}"
          if [ "$TIERS" = "both" ] || [ "$TIERS" = "" ] || [ "$TIERS" = "$TIER" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping $TIER tier (training_tiers=$TIERS)"
          fi

      - name: Checkout repository
        if: steps.tier-check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.tier-check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        if: steps.tier-check.outputs.skip != 'true'
        run: pip install huggingface_hub llama-cpp-python

      - name: Run evaluation + regression gate
        if: steps.tier-check.outputs.skip != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TIER: ${{ matrix.tier }}
          VERSION: ${{ env.MODEL_VERSION }}
        run: |
          python scripts/eval_model.py \
            --tier "$TIER" \
            --version "$VERSION" \
            --min-accuracy 0.6 \
            --regression-threshold 0.05

      - name: Upload eval results
        if: steps.tier-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ matrix.tier }}-${{ github.run_id }}
          path: eval_results.json
          if-no-files-found: warn
          retention-days: 90
